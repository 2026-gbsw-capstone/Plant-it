name: frontend
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.6.0
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.2.4
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  image_picker: ^1.2.1
  google_sign_in: ^7.2.0
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  fonts:
    - family: IBMPlexSansKR
      fonts:
        - asset: assets/fonts/IBM_Plex_Sans_KR/IBMPlexSansKR-Thin.ttf
          weight: 100
        - asset: assets/fonts/IBM_Plex_Sans_KR/IBMPlexSansKR-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/IBM_Plex_Sans_KR/IBMPlexSansKR-Light.ttf
          weight: 300
        - asset: assets/fonts/IBM_Plex_Sans_KR/IBMPlexSansKR-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBM_Plex_Sans_KR/IBMPlexSansKR-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBM_Plex_Sans_KR/IBMPlexSansKR-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBM_Plex_Sans_KR/IBMPlexSansKR-Bold.ttf
          weight: 700
    - family: Hahmlet
      fonts:
        - asset: assets/fonts/Hahmlet/Hahmlet-Thin.ttf
          weight: 100
        - asset: assets/fonts/Hahmlet/Hahmlet-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Hahmlet/Hahmlet-Light.ttf
          weight: 300
        - asset: assets/fonts/Hahmlet/Hahmlet-Regular.ttf
          weight: 400
        - asset: assets/fonts/Hahmlet/Hahmlet-Medium.ttf
          weight: 500
        - asset: assets/fonts/Hahmlet/Hahmlet-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Hahmlet/Hahmlet-Bold.ttf
          weight: 700
        - asset: assets/fonts/Hahmlet/Hahmlet-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Hahmlet/Hahmlet-Black.ttf
          weight: 900

  assets:
    - assets/
    - assets/images/
    - assets/icons/