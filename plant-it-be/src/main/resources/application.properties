spring.application.name=plant-it-BE
spring.config.import=optional:file:.env[.properties],optional:classpath:application-local.properties

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

springdoc.swagger-ui.path=/admin/swagger-ui.html
springdoc.api-docs.path=/admin/api-docs
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:true}
springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:true}

firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH:}
firebase.credentials.json=${FIREBASE_CREDENTIALS_JSON:}
firebase.credentials.base64=${FIREBASE_CREDENTIALS_BASE64:}
firebase.project-id=${FIREBASE_PROJECT_ID:}
firebase.storage-bucket=${FIREBASE_STORAGE_BUCKET:}

storage.provider=${STORAGE_PROVIDER:firebase}
aws.s3.bucket=${AWS_S3_BUCKET:}
aws.s3.public-url-base=${AWS_S3_PUBLIC_URL_BASE:}
aws.s3.region=${AWS_REGION:ap-northeast-2}

openai.api-key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4o-mini}
openai.max-retries=${OPENAI_MAX_RETRIES:2}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.smtp.ssl.trust=smtp.mail.me.com
mail.from=${MAIL_FROM:${MAIL_USERNAME:}}

admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:admin}

# Multipart and Server Limits
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
server.max-http-header-size=32KB
server.tomcat.max-http-form-post-size=20MB
server.tomcat.max-swallow-size=20MB

# JWT Token Expiration (180 days = 15,552,000 seconds)
jwt.access-token-expiration-seconds=15552000
jwt.refresh-token-expiration-seconds=15552000

